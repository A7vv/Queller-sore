    <style>
        :root {

            --bg-deep: #0a0a0b;
            --card-bg: #141417;
            --text-gray: #a0a0a5;
            --star-color: #ffc107;
        }
        body {

            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            scroll-behavior: smooth;
        }

        /* 丕賱賴賷丿乇 */
        nav {
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--primary); }

        /* 丨丕賵賷丞 丕賱賲賳鬲噩丕鬲 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px; padding: 40px 5%;
            max-width: 1200px; margin: auto;
        }

        /* 亘胤丕賯丞 丕賱賲賳鬲噩 丕賱賲胤賵乇丞 亘丕賱氐賵乇 */
        .product-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .product-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .product-img-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
            position: relative;
        }
        .product-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }
        .product-card:hover .product-img-container img {
            transform: scale(1.1);
        }

        .product-content { padding: 25px; }
        .product-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }

        /* 賳馗丕賲 丕賱鬲賯賷賷賲 */
        .rating-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .stars { display: flex; flex-direction: row-reverse; gap: 4px; }
        .stars i { color: #333; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .stars i:hover, .stars i:hover ~ i, .stars i.active { color: var(--star-color); }
        .rating-text { font-size: 0.85rem; color: var(--text-gray); }

        .price-tag { 
            font-size: 1.6rem; 
            font-weight: 800; 
            color: var(--primary);
            margin-bottom: 20px;
        }

        /* 夭乇 丕賱胤賱亘 丕賱丕丨鬲乇丕賮賷 */
        .btn-order {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            color: black;
            text-decoration: none;
            padding: 15px;
            border-radius: 16px;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-order:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        /* 丕賱鬲匕賷賷賱 */
        footer {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 50px;
        }
    </style>
</head>

<script>
    function rate(starElement, rating) {
        const container = starElement.parentElement;
        const stars = container.querySelectorAll('i');
        const productId = container.getAttribute('data-product');
        const countSpan = document.getElementById('count-' + productId);

        stars.forEach(s => s.classList.remove('active'));
        stars.forEach((s, index) => {
            if (5 - index <= rating) s.classList.add('active');
        });

        countSpan.innerText = parseInt(countSpan.innerText) + 1;
        alert("卮賰乇丕賸 賱鬲賯賷賷賲賰 亘賭 " + rating + " 賳噩賵賲! 乇兀賷賰 賷賴賲賳丕.");
