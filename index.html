<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queller Store | الفخامة الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --bg-deep: #0a0a0b;
            --card-bg: #141417;
            --text-gray: #a0a0a5;
            --star-color: #ffc107;
            --heart-red: #ff4b2b;
        }
        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            scroll-behavior: smooth;
        }

        nav {
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.6rem; font-weight: bold; }
        .logo span { color: var(--primary); }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; padding: 40px 5%;
            max-width: 1400px; margin: auto;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.4s ease;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .product-img { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .product-content { padding: 20px; flex-grow: 1; }
        .product-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
        
        .rating-box {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; background: rgba(255,255,255,0.02);
            padding: 8px 12px; border-radius: 10px;
        }
        .stars { color: var(--star-color); font-size: 0.8rem; }
        .rating-count { font-size: 0.75rem; color: var(--text-gray); }

        /* --- إضافات التفاعل الجديدة --- */
        .interaction-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .rate-link {
            color: var(--primary);
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            border-bottom: 1px dashed var(--primary);
        }
        .like-btn {
            background: none; border: none; color: #444;
            cursor: pointer; font-size: 1.1rem; transition: 0.3s;
        }
        .like-btn.active { color: var(--heart-red); }
        /* -------------------------- */

        .price { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; }

        .btn-order {
            background: white; color: black;
            text-decoration: none; text-align: center;
            padding: 12px; border-radius: 12px;
            font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-order:hover { background: var(--primary); color: white; }

        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px;
            background-color: #25d366; color: white;
            width: 60px; height: 60px; border-radius: 50px;
            text-align: center; font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .main-footer {
            background: #000;
            padding: 50px 10% 20px;
            border-top: 1px solid rgba(0, 210, 255, 0.1);
            margin-top: 60px;
            direction: rtl;
        }
        .footer-grid {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-section { flex: 1; min-width: 250px; text-align: center; }
        .footer-logo { font-size: 2.2rem; margin-bottom: 15px; }
        .footer-about-text { color: #a0a0a5; line-height: 1.8; font-size: 0.9rem; }
        .footer-btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .social-circle {
            width: 45px; height: 45px; background: #111; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s;
        }
        .social-circle:hover { background: #00d2ff; transform: translateY(-5px); }
        .footer-contact { display: block; color: #a0a0a5; text-decoration: none; margin-bottom: 10px; font-size: 0.9rem; }
        .footer-contact i { color: #00d2ff; margin-left: 8px; }

        .modal {
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: linear-gradient(145deg, #111, #050505);
            margin: 15% auto;
            padding: 35px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            width: 85%;
            max-width: 550px;
            border-radius: 20px;
            text-align: right;
            color: #fff;
            position: relative;
            animation: modalFade 0.4s ease;
        }
        @keyframes modalFade {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-btn {
            position: absolute;
            top: 15px; left: 20px;
            color: #666;
            font-size: 24px;
            cursor: pointer;
        }
        /* نجوم التقييم داخل النافذة */
        .rating-stars-input {
            display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; margin: 20px 0;
        }
        .rating-stars-input input { display: none; }
        .rating-stars-input label { font-size: 30px; color: #333; cursor: pointer; }
        .rating-stars-input input:checked ~ label,
        .rating-stars-input label:hover,
        .rating-stars-input label:hover ~ label { color: var(--star-color); }

    </style>
</head>
<body>

<nav>

        <i class="fas fa-search" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #00d2ff;"></i>
