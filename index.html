<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queller Store | الفخامة الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --bg-deep: #0a0a0b;
            --card-bg: #141417;
            --text-gray: #a0a0a5;
            --star-color: #ffc107;
        }
        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            scroll-behavior: smooth;
        }

        nav {
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--primary); }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; padding: 40px 5%;
            max-width: 1200px; margin: auto;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.4s ease;
        }
        .product-card:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .product-content { padding: 25px; }

        .rating-section {
            margin: 15px 0;
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stars-interactive {
            display: flex;
            flex-direction: row-reverse;
            gap: 5px;
        }
        .stars-interactive i {
            color: #333;
            cursor: pointer;
            transition: 0.2s;
            font-size: 18px;
        }
        .stars-interactive i:hover, .stars-interactive i:hover ~ i, .stars-interactive i.active {
            color: var(--star-color);
        }

        .price-tag { font-size: 1.5rem; font-weight: bold; margin: 10px 0; color: white; }
        
        .btn-order {
            display: block;
            background: white; color: black;
            text-decoration: none; text-align: center;
            padding: 14px; border-radius: 14px; font-weight: bold;
            transition: 0.3s;
        }
        .btn-order:hover { background: var(--primary); color: white; }

        .contact-section {
            background: var(--card-bg);
            padding: 60px 5%; text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .social-group { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .social-item {
            text-decoration: none; color: white; background: rgba(255,255,255,0.05);
            padding: 12px 25px; border-radius: 50px; display: flex; align-items: center; gap: 8px;
            transition: 0.3s;
        }
        .social-item:hover { background: rgba(0, 210, 255, 0.2); }

        footer { padding: 40px; text-align: center; color: var(--text-gray); font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo">QUELLER<span>.</span></div>
    <div style="font-size: 0.8rem; color: var(--text-gray);"><i class="fas fa-certificate" style="color: var(--primary);"></i> متجر موثق</div>
</nav>

<div class="products-grid">
    <div class="product-card">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/8711251219054763925_0" alt="Netflix" class="product-image">
        <div class="product-content">
            <h3>Netflix Premium</h3>
            <div class="rating-section">
                <div class="stars-interactive" data-product="netflix">
                    <i class="fas fa-star" onclick="rateProduct(this, 5)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 4)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 3)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 2)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 1)"></i>
                </div>
                <div class="rating-count">تقييم حقيقي: <span id="count-netflix">42</span></div>
            </div>
            <div class="price-tag">35 ر.س</div>
            <a href="https://wa.me/966502915924?text=مرحباً+متجر+Queller%2C+لدي+طلب+أو+استفسار+بخصوص+اشتراك+نيتفلكس" class="btn-order">اطلب الآن</a>
        </div>
    </div>

    <div class="product-card">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/8064327228935132585_2" alt="YouTube" class="product-image">
        <div class="product-content">
            <h3>YouTube Premium</h3>
            <div class="rating-section">
                <div class="stars-interactive" data-product="youtube">
                    <i class="fas fa-star" onclick="rateProduct(this, 5)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 4)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 3)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 2)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 1)"></i>
                </div>
                <div class="rating-count">تقييم حقيقي: <span id="count-youtube">38</span></div>
            </div>
            <div class="price-tag">15 ر.س</div>
            <a href="https://wa.me/966502915924?text=مرحباً+متجر+Queller%2C+لدي+طلب+أو+استفسار+بخصوص+يوتيوب+بريميوم" class="btn-order">اطلب الآن</a>
        </div>
    </div>

    <div class="product-card">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6715942781341392629_1" alt="Discord" class="product-image">
        <div class="product-content">
            <h3>Discord Nitro</h3>
            <div class="rating-section">
                <div class="stars-interactive" data-product="discord">
                    <i class="fas fa-star" onclick="rateProduct(this, 5)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 4)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 3)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 2)"></i>
                    <i class="fas fa-star" onclick="rateProduct(this, 1)"></i>
                </div>
                <div class="rating-count">تقييم حقيقي: <span id="count-discord">56</span></div>
            </div>
            <div class="price-tag">25 ر.س</div>
            <a href="https://wa.me/966502915924?text=مرحباً+متجر+Queller%2C+لدي+طلب+أو+استفسار+بخصوص+ديسكورد+نيترو" class="btn-order">اطلب الآن</a>
        </div>
    </div>
</div>

<section class="contact-section">
    <h2>تواصل مباشر مع الإدارة</h2>
    <div class="social-group">
        <a href="https://wa.me/966502915924?text=مرحباً+متجر+Queller%2C+لدي+طلب+أو+استفسار+بخصوص+منتجاتكم" class="social-item">
            <i class="fab fa-whatsapp" style="color: #25d366;"></i> واتساب المتجر
        </a>
    </div>
</section>

<footer>
    <p>Queller Store 2026 © جميع الحقوق محفوظة لمتجر كويلر</p>
</footer>

<script>
    function rateProduct(starElement, rating) {
        const container = starElement.parentElement;
        const stars = container.querySelectorAll('i');
        const productId = container.getAttribute('data-product');
        const countSpan = document.getElementById('count-' + productId);

        stars.forEach(s => s.classList.remove('active'));
        stars.forEach((s, index) => {
            if (5 - index <= rating) s.classList.add('active');
        });

        countSpan.innerText = parseInt(countSpan.innerText) + 1;
        alert("شكراً لثقتك بمتجر كويلر! تم تسجيل تقييمك بـ " + rating + " نجوم.");
    }
</script>

</body>
</html>
