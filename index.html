<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queller Store | الفخامة الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --bg-deep: #0a0a0b;
            --card-bg: #141417;
            --text-gray: #a0a0a5;
            --star-color: #ffc107;
        }
        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            scroll-behavior: smooth;
        }

        /* نافبار */
        nav {
            padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.6rem; font-weight: bold; }
        .logo span { color: var(--primary); }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; padding: 40px 5%;
            max-width: 1400px; margin: auto;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.4s ease;
        }
        .product-card:hover {
            border-color: var(--primary);
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .product-img { width: 100%; height: 180px; object-fit: cover; }

        .product-content { padding: 20px; }
        .product-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
        
        .rating-box {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; background: rgba(255,255,255,0.02);
            padding: 8px 12px; border-radius: 10px;
        }
        .stars { color: var(--star-color); font-size: 0.8rem; }
        .rating-count { font-size: 0.75rem; color: var(--text-gray); }

        .price { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; }

        /* زر الواتساب الاحترافي */
        .btn-order {
            background: white; color: black;
            text-decoration: none; text-align: center;
            padding: 12px; border-radius: 12px;
            font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-order:hover { background: var(--primary); color: white; }

        /* الأيقونة العائمة */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.1); background-color: #128c7e; }

        footer { padding: 40px; text-align: center; color: var(--text-gray); border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>

</nav>
